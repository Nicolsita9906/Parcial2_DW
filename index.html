<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Hoja de Vida</title>
<link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="logo-big">Hoja de Vida</div>
    <div class="sub">Formato Único — Persona Natural</div>
    <div class="role-tabs">
      <div class="role-tab active" onclick="selectRole(this,'usuario')">Usuario</div>
      <div class="role-tab" onclick="selectRole(this,'admin')">Administrador</div>
    </div>
    <div class="form-grid full" style="gap:12px;">
      <div class="field">
        <label>Correo electrónico <span class="req">*</span></label>
        <input type="email" placeholder="correo@ejemplo.com">
      </div>
      <div class="field">
        <label>Contraseña <span class="req">*</span></label>
        <input type="password" placeholder="••••••••">
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:1rem;" id="btn-ingresar" onclick="ingresar()">Ingresar</button>
    <p style="font-size:12px;color:var(--muted);text-align:center;margin-top:14px;">
      ¿No tienes cuenta? <a href="#" style="color:var(--c2);font-weight:500;">Regístrate</a>
    </p>
  </div>
</div>

<script src="./js/index.js"></script>
</body>
</html>
